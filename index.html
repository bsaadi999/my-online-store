<!DOCTYPE html>
<html>
<head>
    <title>My Online Store</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }
        .product {
            border: 1px solid #ccc;
            background: white;
            padding: 20px;
            margin: 20px;
            display: inline-block;
            width: 200px;
        }
        button {
            background-color: black;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>My Online Store</h1>

<div class="product">
    <h2>Product 1</h2>
    <p>$10</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h2>Product 2</h2>
    <p>$15</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h2>Product 3</h2>
    <p>$20</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h2>Product 4</h2>
    <p>$25</p>
    <button>Buy Now</button>
</div>

</body>
</html>
